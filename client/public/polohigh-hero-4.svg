<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#grad4)"/>
  
  <!-- Geometric pattern -->
  <g opacity="0.2" fill="#4a5568">
    <rect x="950" y="50" width="40" height="40" rx="8" transform="rotate(15 970 70)"/>
    <rect x="1080" y="150" width="30" height="30" rx="6" transform="rotate(-20 1095 165)"/>
    <rect x="850" y="250" width="35" height="35" rx="7" transform="rotate(30 867 267)"/>
    <circle cx="1150" cy="320" r="20"/>
    <circle cx="900" cy="100" r="15"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(80, 120)">
    <!-- Title -->
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad4)">
      PoloHigh Essentials
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#4a5568" opacity="0.8">
      Everyday Premium Wear
    </text>
    
    <!-- CTA Button -->
    <rect x="0" y="80" width="180" height="50" rx="25" fill="#4a5568"/>
    <text x="90" y="110" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#ffffff">
      Shop Essentials
    </text>
  </g>
  
  <!-- Brand accent -->
  <g transform="translate(720, 150)">
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="120" font-weight="900" fill="#4a5568" opacity="0.1">
      PH
    </text>
  </g>
</svg>