<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pantsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pantsLight" cx="30%" cy="20%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="url(#pantsGrad)"/>
  <rect width="400" height="600" fill="url(#pantsLight)"/>
  
  <!-- Pants illustration -->
  <g transform="translate(200, 180)">
    <!-- Waistband -->
    <rect x="-60" y="0" width="120" height="15" rx="2" fill="#4a5568"/>
    
    <!-- Belt loops -->
    <rect x="-50" y="-5" width="4" height="25" rx="2" fill="#2d3748"/>
    <rect x="-25" y="-5" width="4" height="25" rx="2" fill="#2d3748"/>
    <rect x="0" y="-5" width="4" height="25" rx="2" fill="#2d3748"/>
    <rect x="25" y="-5" width="4" height="25" rx="2" fill="#2d3748"/>
    <rect x="46" y="-5" width="4" height="25" rx="2" fill="#2d3748"/>
    
    <!-- Main pants body -->
    <path d="M -60 15 L -60 200 L -40 380 L -25 380 L -20 200 L 20 200 L 25 380 L 40 380 L 60 200 L 60 15 Z" fill="#718096"/>
    
    <!-- Left leg -->
    <rect x="-40" y="200" width="35" height="180" fill="#4a5568"/>
    <!-- Right leg -->
    <rect x="5" y="200" width="35" height="180" fill="#4a5568"/>
    
    <!-- Inseam -->
    <line x1="-20" y1="200" x2="-22.5" y2="380" stroke="#2d3748" stroke-width="2"/>
    <line x1="20" y1="200" x2="22.5" y2="380" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Side seams -->
    <line x1="-40" y1="200" x2="-40" y2="380" stroke="#2d3748" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="380" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Pockets -->
    <path d="M -45 50 Q -35 55 -45 80 L -55 75 Q -55 55 -45 50 Z" fill="#2d3748" opacity="0.7"/>
    <path d="M 45 50 Q 35 55 45 80 L 55 75 Q 55 55 45 50 Z" fill="#2d3748" opacity="0.7"/>
    
    <!-- Back pocket detail -->
    <rect x="35" y="80" width="20" height="15" rx="2" fill="#2d3748" opacity="0.5"/>
    
    <!-- Cuffs -->
    <rect x="-40" y="375" width="35" height="8" rx="2" fill="#2d3748"/>
    <rect x="5" y="375" width="35" height="8" rx="2" fill="#2d3748"/>
    
    <!-- Front crease -->
    <line x1="-22.5" y1="15" x2="-22.5" y2="200" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
    <line x1="22.5" y1="15" x2="22.5" y2="200" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Fabric texture -->
  <g opacity="0.08">
    <circle cx="120" cy="250" r="1" fill="#ffffff"/>
    <circle cx="290" cy="380" r="1.5" fill="#ffffff"/>
    <circle cx="110" cy="480" r="1" fill="#ffffff"/>
    <circle cx="330" cy="220" r="1" fill="#ffffff"/>
    <circle cx="90" cy="420" r="1.5" fill="#ffffff"/>
    <circle cx="310" cy="500" r="1" fill="#ffffff"/>
  </g>
</svg>