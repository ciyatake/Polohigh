<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Pattern overlay -->
  <circle cx="1000" cy="80" r="120" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="250" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="900" cy="320" r="60" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main content -->
  <g transform="translate(80, 120)">
    <!-- Title -->
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad1)">
      Premium Hoodies
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#e2e8f0" opacity="0.9">
      Comfort meets Style
    </text>
    
    <!-- CTA Button -->
    <rect x="0" y="80" width="180" height="50" rx="25" fill="#ffffff" opacity="0.95"/>
    <text x="90" y="110" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#4a5568">
      Shop Collection
    </text>
  </g>
  
  <!-- Decorative hoodie icon -->
  <g transform="translate(800, 100)">
    <!-- Hoodie silhouette -->
    <path d="M50 200 L50 180 Q50 160 70 160 L130 160 Q150 160 150 180 L150 200 L150 220 Q150 240 130 240 L70 240 Q50 240 50 220 Z" fill="#ffffff" opacity="0.2"/>
    <!-- Hood -->
    <path d="M70 160 Q100 140 130 160" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3"/>
    <!-- Pocket -->
    <rect x="85" y="190" width="30" height="20" rx="3" fill="#ffffff" opacity="0.15"/>
  </g>
</svg>