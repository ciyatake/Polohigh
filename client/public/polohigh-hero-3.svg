<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#grad3)"/>
  
  <!-- Snowflake pattern -->
  <g opacity="0.15" fill="#ffffff">
    <g transform="translate(950, 60)">
      <!-- Snowflake -->
      <line x1="20" y1="5" x2="20" y2="35" stroke="#ffffff" stroke-width="2"/>
      <line x1="5" y1="20" x2="35" y2="20" stroke="#ffffff" stroke-width="2"/>
      <line x1="11" y1="11" x2="29" y2="29" stroke="#ffffff" stroke-width="1"/>
      <line x1="29" y1="11" x2="11" y2="29" stroke="#ffffff" stroke-width="1"/>
    </g>
    <g transform="translate(1050, 180)">
      <line x1="15" y1="3" x2="15" y2="27" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="3" y1="15" x2="27" y2="15" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="8" y1="8" x2="22" y2="22" stroke="#ffffff" stroke-width="1"/>
      <line x1="22" y1="8" x2="8" y2="22" stroke="#ffffff" stroke-width="1"/>
    </g>
    <g transform="translate(880, 280)">
      <line x1="12" y1="2" x2="12" y2="22" stroke="#ffffff" stroke-width="1"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="#ffffff" stroke-width="1"/>
      <line x1="6" y1="6" x2="18" y2="18" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="18" y1="6" x2="6" y2="18" stroke="#ffffff" stroke-width="0.8"/>
    </g>
  </g>
  
  <!-- Main content -->
  <g transform="translate(80, 120)">
    <!-- Title -->
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad3)">
      Winter Collection
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#f0fdff" opacity="0.9">
      Stay Warm, Look Cool
    </text>
    
    <!-- CTA Button -->
    <rect x="0" y="80" width="170" height="50" rx="25" fill="#ffffff" opacity="0.95"/>
    <text x="85" y="110" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#4a5568">
      Shop Winter
    </text>
  </g>
</svg>