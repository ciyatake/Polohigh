<svg width="1400" height="600" viewBox="0 0 1400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Light gradient background -->
    <linearGradient id="lightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1400" height="600" fill="url(#lightBg)"/>
  
  <!-- Subtle decorative elements -->
  <circle cx="1200" cy="100" r="80" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="1300" cy="250" r="60" fill="#e2e8f0" opacity="0.4"/>
  <rect x="100" y="450" width="120" height="120" rx="60" fill="#f8fafc" opacity="0.5"/>
  
  <!-- Main content container -->
  <g transform="translate(120, 150)">
    <!-- Brand title -->
    <text x="0" y="80" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="88" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2px">
      PoloHigh
    </text>
    
    <!-- Tagline -->
    <text x="0" y="130" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="24" font-weight="400" fill="#64748b" opacity="0.9">
      Where premium quality meets contemporary style
    </text>
    
    <!-- Description -->
    <text x="0" y="170" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="18" font-weight="300" fill="#64748b" opacity="0.7">
      Discover our carefully curated collection designed for the modern lifestyle
    </text>
  </g>
  
  <!-- Feature cards section -->
  <g transform="translate(120, 350)">
    <!-- Card 1: Fast Delivery -->
    <g>
      <rect width="320" height="120" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
      <rect x="20" y="20" width="48" height="48" rx="12" fill="url(#accentGrad)"/>
      <text x="36" y="50" text-anchor="middle" font-family="Inter, sans-serif" 
            font-size="18" font-weight="700" fill="#475569">FD</text>
      
      <text x="85" y="35" font-family="Inter, sans-serif" 
            font-size="18" font-weight="600" fill="#1e293b">Fast Delivery</text>
      <text x="85" y="58" font-family="Inter, sans-serif" 
            font-size="14" font-weight="400" fill="#64748b">Delivery in 2-3 days</text>
    </g>
    
    <!-- Card 2: Location -->
    <g transform="translate(360, 0)">
      <rect width="320" height="120" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
      <rect x="20" y="20" width="48" height="48" rx="12" fill="url(#accentGrad)"/>
      <text x="36" y="50" text-anchor="middle" font-family="Inter, sans-serif" 
            font-size="18" font-weight="700" fill="#475569">IN</text>
      
      <text x="85" y="35" font-family="Inter, sans-serif" 
            font-size="18" font-weight="600" fill="#1e293b">Location</text>
      <text x="85" y="58" font-family="Inter, sans-serif" 
            font-size="14" font-weight="400" fill="#64748b">Pan India delivery</text>
    </g>
    
    <!-- Card 3: Special Offer -->
    <g transform="translate(720, 0)">
      <rect width="420" height="120" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
      <rect x="20" y="20" width="48" height="48" rx="12" fill="url(#accentGrad)"/>
      <text x="36" y="50" text-anchor="middle" font-family="Inter, sans-serif" 
            font-size="17" font-weight="700" fill="#475569">OF</text>
      
      <text x="85" y="35" font-family="Inter, sans-serif" 
            font-size="18" font-weight="600" fill="#1e293b">Special Offer</text>
      <text x="85" y="58" font-family="Inter, sans-serif" 
            font-size="14" font-weight="400" fill="#64748b">Free shipping on orders above Rs 999</text>
    </g>
  </g>
  
  <!-- Minimal decorative line -->
  <line x1="120" y1="320" x2="1280" y2="320" stroke="#e2e8f0" stroke-width="1" opacity="0.6"/>
  
  <!-- Subtle brand mark -->
  <g transform="translate(1200, 450)" opacity="0.1">
    <text font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#334155">PH</text>
  </g>
</svg>