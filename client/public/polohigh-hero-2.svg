<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#grad2)"/>
  
  <!-- Pattern overlay -->
  <polygon points="1050,50 1150,150 1050,250 950,150" fill="#ffffff" opacity="0.1"/>
  <polygon points="1100,200 1180,280 1100,360 1020,280" fill="#ffffff" opacity="0.08"/>
  
  <!-- Main content -->
  <g transform="translate(80, 120)">
    <!-- Title -->
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad2)">
      New Arrivals
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#fff5f5" opacity="0.9">
      Discover Latest Fashion
    </text>
    
    <!-- CTA Button -->
    <rect x="0" y="80" width="160" height="50" rx="25" fill="#ffffff" opacity="0.95"/>
    <text x="80" y="110" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#4a5568">
      Explore Now
    </text>
  </g>
  
  <!-- Decorative stars -->
  <g transform="translate(750, 80)">
    <polygon points="30,10 35,25 50,25 38,35 43,50 30,40 17,50 22,35 10,25 25,25" fill="#ffffff" opacity="0.25"/>
    <polygon points="100,150 102,157 110,157 104,162 106,170 100,166 94,170 96,162 90,157 98,157" fill="#ffffff" opacity="0.2"/>
    <polygon points="150,100 153,108 162,108 156,114 159,123 150,118 141,123 144,114 138,108 147,108" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>